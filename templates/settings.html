{% extends "base.html" %}

{% block title %}Configurações - Pink Urban List{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Configurações</h1>
            <p>Alterar sua senha</p>
        </div>

        <form class="auth-form" id="settingsForm">
            <div class="form-group">
                <label class="form-label" for="current_password">Senha Atual</label>
                <input type="password" class="form-input" id="current_password" name="current_password" required autocomplete="current-password" placeholder="Sua senha atual">
            </div>

            <div class="form-group">
                <label class="form-label" for="new_password">Nova Senha</label>
                <input type="password" class="form-input" id="new_password" name="new_password" required autocomplete="new-password" placeholder="Minimo 6 caracteres" minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirmar Nova Senha</label>
                <input type="password" class="form-input" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="Repita a nova senha">
            </div>

            <div class="error-text" id="settingsError"></div>
            <div class="success-text" id="settingsSuccess"></div>

            <button type="submit" class="btn btn-primary btn-full" id="settingsBtn">Salvar Nova Senha</button>
        </form>

        <p class="auth-footer-text">
            <a href="{{ url_for('main.index') }}" class="link">&larr; Voltar ao inicio</a>
        </p>
    </div>
</div>

<script>
document.getElementById('settingsForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const current = document.getElementById('current_password').value;
    const newPw = document.getElementById('new_password').value;
    const confirm = document.getElementById('confirm_password').value;
    const errorEl = document.getElementById('settingsError');
    const successEl = document.getElementById('settingsSuccess');
    const btn = document.getElementById('settingsBtn');

    errorEl.textContent = '';
    successEl.textContent = '';

    if (newPw.length < 6) { errorEl.textContent = 'Nova senha deve ter pelo menos 6 caracteres.'; return; }
    if (newPw !== confirm) { errorEl.textContent = 'As senhas nao coincidem.'; return; }

    btn.textContent = 'Salvando...';
    btn.disabled = true;

    try {
        const res = await fetch('/auth/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_password: current, new_password: newPw })
        });

        const data = await res.json();

        if (res.ok) {
            successEl.textContent = data.message || 'Senha alterada com sucesso!';
            document.getElementById('current_password').value = '';
            document.getElementById('new_password').value = '';
            document.getElementById('confirm_password').value = '';
            btn.textContent = 'Senha alterada!';
            btn.disabled = true;
        } else {
            errorEl.textContent = data.error || 'Erro ao alterar senha.';
            btn.textContent = 'Salvar Nova Senha';
            btn.disabled = false;
        }
    } catch (err) {
        errorEl.textContent = 'Erro de conexao. Tente novamente.';
        btn.textContent = 'Salvar Nova Senha';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
