{% extends "base.html" %}

{% block title %}Entrar - Pink Urban List{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>Bem-vindo de volta</h1>
            <p>Entre na sua conta para acessar suas listas</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <input type="text" class="form-input" id="username" name="username" required autocomplete="username" placeholder="Seu usuario">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password" placeholder="Sua senha">
            </div>

            <div class="error-text" id="loginError"></div>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Entrar</button>
        </form>

        <p class="auth-footer-text">
            Nao tem conta? <a href="{{ url_for('auth.register') }}" class="link">Cadastre-se</a>
        </p>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errorEl.textContent = '';
    btn.textContent = 'Entrando...';
    btn.disabled = true;

    try {
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = '/';
        } else {
            errorEl.textContent = data.error || 'Erro ao fazer login.';
            btn.textContent = 'Entrar';
            btn.disabled = false;
        }
    } catch (err) {
        errorEl.textContent = 'Erro de conexao. Tente novamente.';
        btn.textContent = 'Entrar';
        btn.disabled = false;
    }
});
</script>
{% endblock %}
