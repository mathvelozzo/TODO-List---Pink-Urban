{% extends "base.html" %}

{% block content %}
<div class="admin-page">
    <div class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h2>Admin</h2>
        </div>
        <div class="admin-nav">
            <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link {% if request.endpoint and 'dashboard' in request.endpoint %}admin-nav-active{% endif %}">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/></svg>
                Painel
            </a>
            <a href="{{ url_for('admin.all_users') }}" class="admin-nav-link {% if request.endpoint and 'all_users' in request.endpoint %}admin-nav-active{% endif %}">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
                Usuarios
            </a>
            <a href="{{ url_for('main.index') }}" class="admin-nav-link admin-nav-back">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" d="M19 12H5m7-7l-7 7 7 7"/></svg>
                Voltar ao Site
            </a>
        </div>
    </div>

    <div class="admin-body">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
